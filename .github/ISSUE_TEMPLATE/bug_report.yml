name: Bug Report
description: Report a bug to help us improve the app.
title: "[BUG] <Describe the issue>"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us what you expected to happen.
      placeholder: Describe the bug...
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Android PWA
        - iOS PWA
        - Desktop Browser
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can someone else see this bug?
      placeholder: |
        1. Open the app...
        2. Click on...
        3. See error...
    validations:
      required: true
